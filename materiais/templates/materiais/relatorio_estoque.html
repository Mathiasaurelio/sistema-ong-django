{% extends 'materiais/base.html' %}

{% block conteudo %}
    <h1>📊 Relatório de Estoque</h1>

    <table>
        <thead>
            <tr>
                <th>Material</th>
                <th>Categoria</th>
                <th>Estoque Atual</th>
            </tr>
        </thead>
        <tbody>
            {% for dado in dados %}
            <tr>
                <td>{{ dado.nome }}</td>
                <td>{{ dado.categoria }}</td>
                <td>{{ dado.estoque_atual }} unidades</td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="3">Nenhum dado disponível.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
{% endblock %}
